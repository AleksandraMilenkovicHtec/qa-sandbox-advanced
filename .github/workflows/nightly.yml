name: Nightly Tests
# This workflow runs the Playwright tests on a nightly basis and generates an Allure report.
# on:
#   schedule:
#     - cron: '0 2 * * *'
#   workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        project: [api, ui-chromium, ui-firefox, ui-webkit]
    environment: qa
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      USER_EMAIL: ${{ secrets.USER_EMAIL }}
      USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run ${{ matrix.project }} tests
        run: npx playwright test --project=${{ matrix.project }}

      - name: Analyze HAR files
        if: always()
        run: npm run analyze:har

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-${{ matrix.project }}
          path: reports/allure-results/
          retention-days: 7

      - name: Upload HAR files
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: har-${{ matrix.project }}
          path: reports/har/
          retention-days: 7

  report:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: reports/allure-results/
          merge-multiple: true

      - name: Generate Allure report
        run: allure generate reports/allure-results --clean -o reports/allure-report

      - name: Upload Allure report artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-nightly
          path: reports/allure-report/
          retention-days: 30

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload report to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/allure-report/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print report URL
        run: echo "Nightly report published at ${{ steps.deployment.outputs.page_url }}"
